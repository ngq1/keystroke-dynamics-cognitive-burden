name: Deploy React Frontend to GitHub Pages

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: keystroke-data-collector/frontend/package-lock.json

    - name: Install dependencies
      run: |
        cd keystroke-data-collector/frontend
        npm ci

    - name: Build
      run: |
        cd keystroke-data-collector/frontend
        npm run build

    - name: Deploy to GitHub Pages
      if: github.ref == 'refs/heads/master'
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: keystroke-data-collector/frontend/build
        cname: keystroke-dynamics.ngq1.github.io